_config_version: 23
agent:
  api_max_retries: 3
  disabled_toolsets: []
  gateway_auto_continue_freshness: 3600
  gateway_notify_interval: 180
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  image_input_mode: auto
  max_turns: 200
  restart_drain_timeout: 180
  service_tier: ''
  tool_use_enforcement: auto
  task_completion_guidance: true
  parallel_tool_call_guidance: true
  environment_probe: true
  environment_hint: ''
  coding_context: auto
  clarify_timeout: 600
approvals:
  cron_mode: deny
  mcp_reload_confirm: true
  destructive_slash_confirm: true
  mode: manual
  timeout: 60
auxiliary: {}
bedrock:
  discovery:
    enabled: true
    provider_filter: []
    refresh_interval: 3600
  guardrail:
    guardrail_identifier: ''
    guardrail_version: ''
    stream_processing_mode: async
    trace: disabled
  region: ''
browser:
  allow_private_urls: false
  auto_local_for_private_urls: true
  camofox:
    managed_persistence: false
  cdp_url: ''
  cloud_provider: browser-use
  command_timeout: 30
  dialog_policy: must_respond
  dialog_timeout_s: 300
  inactivity_timeout: 120
  record_sessions: false
checkpoints:
  auto_prune: false
  delete_orphans: true
  enabled: true
  max_snapshots: 50
  min_interval_hours: 24
  retention_days: 7
code_execution:
  mode: project
command_allowlist:
- recursive delete
- shell command via -c/-lc flag
- script execution via -e/-c flag
- delete in root path
- overwrite project env/config file
- execute_code
- stop/restart system service
- kill process via pgrep expansion (self-termination)
compression:
  enabled: true
  hygiene_hard_message_limit: 400
  protect_last_n: 20
  target_ratio: 0.2
  threshold: 0.95
  protect_first_n: 3
  abort_on_summary_failure: false
context:
  engine: compressor
context_file_max_chars: null
credential_pool_strategies: {}
cron:
  max_parallel_jobs: null
  wrap_response: true
curator:
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  consolidate: false
  prune_builtins: true
dashboard:
  theme: default
delegation:
  api_key: ''
  base_url: ''
  child_timeout_seconds: 600
  inherit_mcp_toolsets: true
  max_concurrent_children: 3
  max_iterations: 50
  max_spawn_depth: 1
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
  subagent_auto_approve: false
  max_async_children: 3
discord:
  allowed_channels: ''
  auto_thread: true
  channel_prompts: {}
  free_response_channels: ''
  reactions: true
  require_mention: true
  server_actions: ''
display:
  bell_on_complete: false
  busy_input_mode: interrupt
  compact: false
  ephemeral_system_ttl: 0
  final_response_markdown: strip
  inline_diffs: true
  interim_assistant_messages: true
  personality: kawaii
  platforms: {}
  resume_display: full
  runtime_footer:
    enabled: false
    fields:
    - model
    - context_pct
    - cwd
  show_cost: false
  show_reasoning: false
  skin: poseidon
  streaming: false
  tui_auto_resume_recent: false
  tui_status_indicator: kaomoji
  user_message_preview:
    first_lines: 2
    last_lines: 2
fallback_providers: []
file_read_max_chars: 100000
goals:
  max_turns: 20
honcho: {}
hooks: {}
hooks_auto_accept: false
human_delay:
  max_ms: 2500
  min_ms: 800
  mode: 'off'
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2
  worker_log_rotate_bytes: 2097152
  worker_log_backup_count: 1
  orchestrator_profile: ''
  default_assignee: ''
  max_in_progress_per_profile: null
  auto_decompose: true
  auto_decompose_per_tick: 3
  dispatch_stale_timeout_seconds: 14400
known_plugin_toolsets:
  cli:
  - spotify
logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
mattermost:
  channel_prompts: {}
memory:
  memory_char_limit: 2200
  memory_enabled: true
  provider: ''
  user_char_limit: 1375
  user_profile_enabled: true
  write_approval: false
model: {}
model_catalog:
  enabled: true
  providers: {}
  ttl_hours: 24
  url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
network:
  force_ipv4: false
onboarding:
