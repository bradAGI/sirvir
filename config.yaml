  tirith_fail_open: true
  tirith_path: tirith
  tirith_timeout: 5
  website_blocklist:
    domains: []
    enabled: false
    shared_files: []
  acked_advisories: []
  allow_lazy_installs: true
session_reset:
  at_hour: 4
  idle_minutes: 1440
  mode: both
sessions:
  auto_prune: false
  min_interval_hours: 24
  retention_days: 90
  vacuum_after_prune: true
  write_json_snapshots: false
skills:
